<!DOCTYPE html>
<html>
<head>
  <title>Zermatt Hazard Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 100vh; }

    .legend {
      background: white;
      padding: 10px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>
  // Map centered on Zermatt
  var map = L.map('map').setView([46.0207, 7.7491], 11);

  // Basemap
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'Map data © OpenStreetMap'
  }).addTo(map);

  // Hazard marker (Zermatt)
  var marker = L.marker([46.0207, 7.7491]).addTo(map);

  marker.bindPopup(`
    <b>Zermatt Hazard Status</b><br><br>
    Frost: Level 1 (Low)<br>
    Drought: Level 1 (Low)<br>
    Fire Risk: Moderate<br><br>
    <i>Updated: April 2026</i>
  `);

  // Example hazard zone (colored area)
  var hazardZone = L.circle([46.0207, 7.7491], {
    color: 'yellow',
    fillColor: 'yellow',
    fillOpacity: 0.3,
    radius: 5000
  }).addTo(map);

  // Legend
  var legend = L.control({position: 'bottomright'});

  legend.onAdd = function () {
    var div = L.DomUtil.create('div', 'legend');
    div.innerHTML = `
      <b>Hazard Levels</b><br>
      🟢 1 - Low<br>
      🟡 2 - Moderate<br>
      🟠 3 - Considerable<br>
      🔴 4 - High<br>
      🟥 5 - Very High
    `;
    return div;
  };

  legend.addTo(map);

</script>

</body>
</html>
